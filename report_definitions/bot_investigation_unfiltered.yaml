group: bot_investigation_unfiltered
description: "Bot investigation reports with no segment filter (all traffic)"
transform_type: bot_investigation

defaults:
  segments: []
  metrics:
    - metrics/event3
    - cm3938_602b915cb99757640284234e
    - cm3938_66d0bfba05c95b4eca739eb4
    - metrics/itemtimespent
    - metrics/pageviews
  row_limit: 500

reports:
  botInvestigationUnfilteredMetricsByDay:
    dimension: variables/daterangeday
    csv_headers:
      - id
      - day
      - unique_visitors
      - visits
      - Raw_Clickouts
      - Engaged_Visits
      - First_Time_Visits
      - Total_Seconds_Spent
      - Page_Views
      - fileName
      - fromDate
      - toDate

