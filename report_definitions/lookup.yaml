      - variablesmobilemanufacturer
      - unique_visitors
      - visits
      - fileName
      - fromDate
      - toDate

  Lookupvariablesmonitorresolution:
    dimension: variables/monitorresolution
    csv_headers:
      - id
      - variablesmonitorresolution
      - unique_visitors
      - visits
      - fileName
      - fromDate
      - toDate

  Lookupvariablesmarketingchannel:
    dimension: variables/marketingchannel
    csv_headers:
      - id
      - variablesmarketingchannel
      - unique_visitors
      - visits
