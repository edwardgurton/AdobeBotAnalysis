group: lookup
description: "Dimension lookup reports — high row-limit requests for building lookup tables"
transform_type: lookup

defaults:
  segments: []
  metrics: []
  row_limit: 50000

reports:
  Lookupvariablesbrowsertype:
    dimension: variables/browsertype
    csv_headers:
      - id
      - variablesbrowsertype
      - unique_visitors
      - visits
      - fileName
      - fromDate
      - toDate

  Lookupvariablesoperatingsystem:
    dimension: variables/operatingsystem
    csv_headers:
      - id
      - variablesoperatingsystem
      - unique_visitors
      - visits
      - fileName
      - fromDate
      - toDate

  Lookupvariablesmobilemanufacturer:
