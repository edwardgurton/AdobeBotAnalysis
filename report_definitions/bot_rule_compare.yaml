group: bot_rule_compare
description: "Bot rule comparison reports (segment vs all-traffic across suspicious dimensions)"
transform_type: bot_rule_compare

defaults:
  segments: []  # no default segments; supplied per-rule at runtime
  metrics:
    - metrics/event3
    - cm3938_602b915cb99757640284234e
    - cm3938_66d0bfba05c95b4eca739eb4
    - metrics/itemtimespent
    - metrics/pageviews
  row_limit: 500

reports:
  botInvestigationMetricsByMarketingChannel:
    dimension: variables/marketingchannel
    row_limit: 50
    csv_headers:
      - id
      - marketing_channel
      - unique_visitors
      - visits
      - Raw_Clickouts
      - Engaged_Visits
      - First_Time_Visits
      - Total_Seconds_Spent
      - Page_Views
      - fileName
      - fromDate
      - toDate

  botInvestigationMetricsByMobileManufacturer:
