group: bot_investigation
description: "Bot investigation reports filtered by the Legend Master Bot Filter"
transform_type: bot_investigation

defaults:
  segments:
    - s3938_66fe79408ff02713f66ed76b  # Master Bot Filter
  metrics:
    - metrics/event3
    - cm3938_602b915cb99757640284234e
    - cm3938_66d0bfba05c95b4eca739eb4
    - metrics/itemtimespent
    - metrics/pageviews
  row_limit: 500

reports:
  botInvestigationMetricsByDay:
    dimension: variables/daterangeday
    csv_headers:
      - id
      - day
      - unique_visitors
      - visits
      - Raw_Clickouts
      - Engaged_Visits
      - First_Time_Visits
      - Total_Seconds_Spent
      - Page_Views
      - fileName
      - fromDate
      - toDate

