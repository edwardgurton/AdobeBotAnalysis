job_type: report_download
client: Legend
description: "Download a report iterating over segments from a segment list file"

report_ref: <report-name>

rsids:
  source: file
  file: data/rsid_lists/legend_all.txt
  batch_size: 12

segments:
  source: segment_list_file
  file: data/segment_lists/Legend/<segment-list>.json

interval: month

date_range:
  from: "2025-01-01"
  to: "2025-03-31"

transform:
  enabled: true
  type: bot_validation
  concat: true

resume: true

output:
  base_folder: "/Users/edwardgurton/Documents/Work/Adobe Downloads"
