job_type: composite
client: Legend
description: "Bot rule comparison: download all-traffic + segment variants and transform"

date_range:
  from: "2025-01-01"
  to: "2025-03-31"

output:
  base_folder: "/Users/edwardgurton/Documents/Work/Adobe Downloads"
  # Keep job_name <= 15 chars. bot_rule_compare filenames already embed a long
  # per-rule identifier (rsid + rule name + version + segment id + dates), so a
  # verbose job_name is what tips the combined path over Windows' 260-char
  # MAX_PATH limit. `adobe-downloader validate`/`run` warn if this is exceeded.
  job_name: "<job-name>"

steps:
  - step: report_download
    id: download_compare
    report_group: bot_rule_compare
    rsids:
      source: file
      file: data/rsid_lists/legend_investigation.txt
      batch_size: 12
    bot_rules:
      source: file
      # Keep botRuleName values in this CSV short too, for the same reason as
      # job_name above — e.g. drop a constant project-name prefix repeated on
      # every row (redundant with the row's own numbering), and abbreviate
      # dimension/country names. Put the full run details (what the rule
      # actually filters on, why it was built) in a separate description
      # column instead — parse_bot_rule_csv only reads DimSegmentId/
      # botRuleName/reportToIgnore by name, so extra columns are safely
      # ignored, and the segment_id already links back to the exact
      # definition in Adobe's own segment builder.
      file: data/bot_compare_lists/<compare-list>.csv
    interval: full
    file_name_extra: "<version-label>"   # e.g. V4-Compare

  - step: validate_output
    id: validate
    depends_on: download_compare
    config_ref: download_compare

  - step: transform_concat
    id: transform
    depends_on: validate
    transform:
      type: bot_rule_compare
      source_pattern: ".*<version-label>.*\\.json$"
      concat: true
      # split_by_bot_rule: true   # uncomment for one CSV per bot rule (named after
      #                           # the rule) instead of a single combined CSV.
      #                           # Reuses the bot_rules source from download_compare
      #                           # above — no separate list needed.
    # concat:
    #   enabled: true
    #   file_name_extra: "<version-label>"   # inserted right after job_name in the
    #                                         # output filename, before the per-rule
    #                                         # name when split_by_bot_rule is on:
    #                                         #   COMPARE_<job-name>_<version-label>_<rule>.csv
    #                                         # Omit to keep today's plain naming.
