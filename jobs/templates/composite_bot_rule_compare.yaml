job_type: composite
client: Legend
description: "Bot rule comparison: download all-traffic + segment variants and transform"

date_range:
  from: "2025-01-01"
  to: "2025-03-31"

output:
  base_folder: "/Users/edwardgurton/Documents/Work/Adobe Downloads"

steps:
  - step: report_download
    id: download_compare
    report_group: bot_rule_compare
    rsids:
      source: file
      file: data/rsid_lists/legend_investigation.txt
      batch_size: 12
    bot_rules:
      source: file
      file: data/bot_compare_lists/<compare-list>.csv
    interval: full
    file_name_extra: "<version-label>"   # e.g. V4-Compare

  - step: validate_output
    id: validate
    depends_on: download_compare
    config_ref: download_compare

  - step: transform_concat
    id: transform
    depends_on: validate
    transform:
      type: bot_rule_compare
      source_pattern: ".*<version-label>.*\\.json$"
      concat: true
