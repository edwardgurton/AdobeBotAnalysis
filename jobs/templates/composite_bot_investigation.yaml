job_type: composite
client: Legend
description: "Full bot investigation flow: segment creation → download → validate → transform"

date_range:
  from: "2025-01-01"
  to: "2025-03-31"

output:
  base_folder: "/Users/edwardgurton/Documents/Work/Adobe Downloads"

steps:
  - step: segment_creation
    id: create_segments
    segment_creation:
      input_csv: data/segment_creation_lists/<segment-creation-list>.csv
      share_with_users:
        - "200419062"

  - step: report_download
    id: download_investigation
    report_group: bot_investigation
    rsids:
      source: file
      file: data/rsid_lists/legend_investigation.txt
      batch_size: 12
    segments:
      source: step_output
      step_id: create_segments
      output_key: segment_list_file
    interval: month

  - step: validate_output
    id: validate
    depends_on: download_investigation
    config_ref: download_investigation
    retry: true

  - step: transform_concat
    id: transform
    depends_on: validate
    transform:
      type: bot_investigation
      concat: true
