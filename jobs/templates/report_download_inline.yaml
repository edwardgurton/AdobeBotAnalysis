job_type: report_download
client: Legend
description: "One-off report defined inline (use report_ref for regular reports)"

report:
  name: myCustomReport
  dimension: variables/daterangeday
  row_limit: 500
  segments:
    - s3938_61bb0165a88ab931afa78e4c
  metrics:
    - metrics/visitors
    - metrics/visits
    - metrics/event3
  csv_headers: [id, day, unique_visitors, visits, raw_clickouts, fileName, fromDate, toDate]

rsids:
  source: single
  single: <rsid>

interval: month

date_range:
  from: "2025-01-01"
  to: "2025-03-31"

transform:
  enabled: true
  type: standard
  concat: true

resume: true

output:
  base_folder: "/Users/edwardgurton/Documents/Work/Adobe Downloads"
