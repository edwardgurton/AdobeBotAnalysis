job_type: report_download
client: Legend
description: "Template with test_mode enabled — limits downloads for smoke testing"

report_ref: <report-name>

rsids:
  source: file
  file: data/rsid_lists/legend_all.txt
  batch_size: 12

interval: month

date_range:
  from: "2025-01-01"
  to: "2025-03-31"

test_mode: true
test_limits:
  max_rsids: 2
  max_date_intervals: 1
  max_segments: 2

transform:
  enabled: true
  type: standard
  concat: false              # usually false in test mode — too few files to concat

resume: false               # start fresh on each test run

output:
  base_folder: "/Users/edwardgurton/Documents/Work/Adobe Downloads"
