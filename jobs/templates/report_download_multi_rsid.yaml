job_type: report_download
client: Legend
description: "Download a report group across all RSIDs in a list file"

report_group: <group-name>   # e.g. bot_investigation

rsids:
  source: file
  file: data/rsid_lists/legend_all.txt
  batch_size: 12

interval: month

date_range:
  from: "2025-01-01"
  to: "2025-03-31"

transform:
  enabled: true
  type: bot_investigation
  concat: true

resume: true

output:
  base_folder: "/Users/edwardgurton/Documents/Work/Adobe Downloads"
