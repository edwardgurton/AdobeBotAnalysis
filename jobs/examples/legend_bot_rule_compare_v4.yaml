job_type: composite
client: Legend
description: "Bot rule compare run — V4 vs AllTraffic baseline, Jan–Mar 2025"

date_range:
  from: "2025-01-01"
  to: "2025-03-31"

output:
  base_folder: "/Users/edwardgurton/Documents/Work/Adobe Downloads"

steps:
  - step: bot_rule_compare
    id: download_compare
    rsids:
      source: file
      file: data/rsid_lists/legend_investigation.txt
      batch_size: 12
    bot_rules:
      source: file
      file: data/bot_compare_lists/Apr25-CompareV4.csv
    comparison_round: 4

  - step: validate_output
    id: validate
    depends_on: download_compare
    config_ref: download_compare

  - step: transform_concat
    id: transform
    depends_on: validate
    transform:
      type: bot_rule_compare
      source_pattern: ".*Compare-V4.*\\.json$"
      concat: true
