job_type: composite
client: Legend
description: "Step 19 validation: cube report -- dim_to_segments -> download -> transform"

test_mode: true
test_limits:
  max_rsids: 1
  max_date_intervals: 1
  max_segments: 1

date_range:
  from: "2025-01-01"
  to: "2025-01-31"

output:
  base_folder: "C:/Users/EdwardGurton/Documents/adobe_test_output"
  job_name: "Step19CubeValidation"

steps:
  - step: dim_to_segments
    id: create_channel_segments
    dim_to_segments:
      dimension: variables/marketingchannel.marketing-channel-attribution
      rsid: trillioncoverscom
      additional_segments:
        - s3938_61bb0165a88ab931afa78e4c   # Master Bot Filter EXCLUDE
      num_pairs: 2

  - step: report_download
    id: download_cube
    report:
      name: LegendClickoutsByGeoregionNAOnly
      dimension: variables/georegion
      row_limit: 50
      segments:
        - s3938_61bb0165a88ab931afa78e4c
      metrics:
        - cm3938_67877f0e25c74e65d1f3f449
        - cm3938_68655d7318c56ac719c11a44
        - cm3938_68655dd05c74c471e8de44d0
        - cm3938_68655e0b18c56ac719c11a47
      csv_headers: [id, variablesgeoregion, unique_visitors, visits, raw_clickouts_linear_7d, raw_clickouts_participation_7d, unique_visit_clickouts_linear_7d, unique_visit_clickouts_participation_7d, fileName, fromDate, toDate]
    rsids:
      source: single
      single: trillioncoverscom
    segments:
      source: step_output
      step_id: create_channel_segments
      output_key: segment_list_file
    interval: month
    file_name_extra: "CubeValidation"

  - step: transform_concat
    id: transform
    depends_on: download_cube
    transform:
      type: standard
      source_pattern: ".*CubeValidation.*\\.json$"
      concat: true
