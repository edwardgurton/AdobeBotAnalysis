job_type: composite
client: Legend
description: "Step 19 validation: RSID update -> bot investigation -> validate -> transform"

test_mode: true
test_limits:
  max_rsids: 1
  max_date_intervals: 1
  max_segments: 1

date_range:
  from: "2025-01-01"
  to: "2025-01-31"

output:
  base_folder: "C:/Users/EdwardGurton/Documents/adobe_test_output"

steps:
  - step: rsid_update
    id: update_rsids
    rsid_update:
      investigation_threshold: 1000
      validation_threshold: 1000
      include_virtual: false

  - step: report_download
    id: download_investigation
    report_group: bot_investigation
    rsids:
      source: single
      single: trillioncoverscom
    segments:
      source: inline
      ids:
        - s3938_61bb0165a88ab931afa78e4c   # Master Bot Filter EXCLUDE
    interval: month

  - step: validate_output
    id: validate
    depends_on: download_investigation
    config_ref: download_investigation
    retry: true

  - step: transform_concat
    id: transform
    depends_on: validate
    transform:
      type: bot_investigation
      concat: true
